apiVersion: v1
kind: Secret
metadata:
  name: aasa-secret
  namespace: aasa
  labels:
    app.kubernetes.io/name: aasa
    app.kubernetes.io/component: secrets
type: Opaque
# IMPORTANT: Replace the placeholder below with your actual API key.
#
# Option A — Edit this file:
#   echo -n 'sk-ant-api03-YOUR-KEY' | base64
#   Paste the result below.
#
# Option B — Create via kubectl (recommended, avoids committing secrets):
#   kubectl create secret generic aasa-secret \
#     --namespace aasa \
#     --from-literal=AASA_ANTHROPIC_API_KEY='sk-ant-api03-YOUR-KEY'
#
stringData:
  AASA_ANTHROPIC_API_KEY: "CHANGE-ME"
