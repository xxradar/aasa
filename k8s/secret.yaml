apiVersion: v1
kind: Secret
metadata:
  name: aasa-secret
  namespace: aasa
  labels:
    app.kubernetes.io/name: aasa
    app.kubernetes.io/component: secrets
type: Opaque
# Recommended — create via kubectl (avoids committing secrets):
#   kubectl create secret generic aasa-secret \
#     --namespace aasa \
#     --from-literal=AASA_ANTHROPIC_API_KEY='sk-ant-api03-YOUR-KEY'
#
stringData:
  AASA_ANTHROPIC_API_KEY: "CHANGE-ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: aasa-auth
  namespace: aasa
  labels:
    app.kubernetes.io/name: aasa
    app.kubernetes.io/component: secrets
type: Opaque
# Authentication secret — optional.
# Always use --from-literal to avoid base64 encoding issues:
#
#   kubectl create secret generic aasa-auth -n aasa \
#     --from-literal=AASA_SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=AASA_GITHUB_CLIENT_ID="your-github-client-id" \
#     --from-literal=AASA_GITHUB_CLIENT_SECRET="your-github-client-secret" \
#     --from-literal=AASA_GOOGLE_CLIENT_ID="your-client-id.apps.googleusercontent.com" \
#     --from-literal=AASA_GOOGLE_CLIENT_SECRET="GOCSPX-your-google-secret"
#
# If not created, auth falls back to local email/password only.
stringData:
  AASA_SECRET_KEY: "CHANGE-ME"
  AASA_GITHUB_CLIENT_ID: ""
  AASA_GITHUB_CLIENT_SECRET: ""
  AASA_GOOGLE_CLIENT_ID: ""
  AASA_GOOGLE_CLIENT_SECRET: ""
