apiVersion: v1
kind: Service
metadata:
  name: aasa
  namespace: aasa
  labels:
    app.kubernetes.io/name: aasa
    app.kubernetes.io/component: server
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: aasa
  ports:
    - name: http
      protocol: TCP
      port: 6001           # ClusterIP port
      targetPort: http      # Pod port (6001)
      nodePort: 30601       # External access: http://<node-ip>:30601
