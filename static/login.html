<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — KUBIOSEC SENTINEL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0a0e14;
    --bg2: #141a24;
    --bg3: #1e2632;
    --fg: #e6e6e6;
    --fg2: #9ca3af;
    --fg3: #6b7280;
    --accent: #00ff9d;
    --accent-dim: rgba(0,255,157,0.12);
    --error: #ef4444;
    --radius: 10px;
    --font: Inter, -apple-system, 'system-ui', Helvetica, Arial, sans-serif;
}

body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.login-container {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
}

/* Logo / brand */
.brand {
    text-align: center;
    margin-bottom: 36px;
}
.brand svg { margin-bottom: 16px; }
.brand h1 {
    font-size: 22px;
    letter-spacing: 5px;
    text-transform: uppercase;
}
.brand h1 .dim { font-weight: 400; opacity: 0.5; }
.brand h1 .bold { font-weight: 700; }

/* Card */
.card {
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 16px;
    padding: 36px 32px;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--bg3);
}
.tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 14px;
    font-weight: 500;
    color: var(--fg3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none; border-left: none; border-right: none;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--fg2); }

/* Form */
.form-group { margin-bottom: 18px; }
.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg2);
    margin-bottom: 6px;
}
.form-group input {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--bg3);
    border-radius: var(--radius);
    color: var(--fg);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
}
.form-group input::placeholder { color: var(--fg3); }
.form-group input:focus { border-color: var(--accent); }

.forgot {
    float: right;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    opacity: 0.7;
}
.forgot:hover { opacity: 1; }

/* Primary button */
.btn-primary {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    background: linear-gradient(135deg, #00ff9d, #00cc7d);
    color: #0a0e14;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 6px;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* Divider */
.divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
    color: var(--fg3);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--bg3);
}

/* OAuth buttons */
.btn-oauth {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--bg3);
    border-radius: var(--radius);
    background: transparent;
    color: var(--fg);
    font-size: 14px;
    font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 10px;
}
.btn-oauth:hover { border-color: var(--fg3); background: rgba(255,255,255,0.03); }
.btn-oauth:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-oauth svg { flex-shrink: 0; }

/* Error */
.error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--error);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
}
.error-msg.visible { display: block; }

/* Footer */
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--fg3);
}
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Hidden */
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="login-container">
    <div class="brand">
        <svg width="48" height="54" viewBox="0 0 24 28" fill="none">
            <path d="M12 1L2 5.5v7.5c0 6.5 4.3 11.3 10 13 5.7-1.7 10-6.5 10-13V5.5L12 1z"
                  fill="rgba(0,255,157,0.12)" stroke="#00ff9d" stroke-width="1.5"/>
            <path d="M8.5 14l2.5 2.5L16 11" stroke="#00ff9d" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <h1><span class="dim">KUBIOSEC</span> <span class="bold">SENTINEL</span></h1>
    </div>

    <div class="card">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="login">Sign in</button>
            <button class="tab" data-tab="register">Create account</button>
        </div>

        <!-- Error -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Login form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">Sign in</button>
        </form>

        <!-- Register form -->
        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label for="regName">Name</label>
                <input type="text" id="regName" placeholder="Your name" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="btn-primary" id="regBtn">Create account</button>
        </form>

        <!-- OAuth divider -->
        <div class="divider">or</div>

        <!-- OAuth buttons -->
        <button class="btn-oauth" id="btnGithub" onclick="window.location.href='/auth/github'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            Sign in with GitHub
        </button>

        <button class="btn-oauth" id="btnGoogle" onclick="window.location.href='/auth/google'">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>
    </div>
</div>

<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const isLogin = tab.dataset.tab === 'login';
        document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
        document.getElementById('registerForm').classList.toggle('hidden', isLogin);
        hideError();
    });
});

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
}
function hideError() {
    document.getElementById('errorMsg').classList.remove('visible');
}

// Check URL params for OAuth errors
const params = new URLSearchParams(window.location.search);
if (params.get('error')) {
    const errors = {
        'github_denied': 'GitHub login was cancelled.',
        'google_denied': 'Google login was cancelled.',
        'github_token_failed': 'GitHub authentication failed.',
        'google_token_failed': 'Google authentication failed.',
        'github_no_email': 'Could not get email from GitHub.',
        'google_no_email': 'Could not get email from Google.',
    };
    showError(errors[params.get('error')] || 'Authentication failed.');
}

// Login form
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
        const resp = await fetch('/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value,
            }),
        });
        if (!resp.ok) {
            const data = await resp.json();
            throw new Error(data.detail || 'Login failed');
        }
        window.location.href = '/';
    } catch (err) {
        showError(err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
    }
});

// Register form
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('regBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
        const resp = await fetch('/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: document.getElementById('regName').value || null,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
            }),
        });
        if (!resp.ok) {
            const data = await resp.json();
            throw new Error(data.detail || 'Registration failed');
        }
        window.location.href = '/';
    } catch (err) {
        showError(err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
    }
});

// Check provider availability and disable buttons if not configured
fetch('/auth/providers').then(r => r.json()).then(providers => {
    if (!providers.github) document.getElementById('btnGithub').disabled = true;
    if (!providers.google) document.getElementById('btnGoogle').disabled = true;
});
</script>

</body>
</html>
